<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在返回应用...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9fb;
            color: #333;
        }
        /* 加载动画 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007AFF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .content { text-align: center; padding: 0 20px; }
        h2 { font-size: 1.2rem; margin-bottom: 10px; }
        p { color: #666; font-size: 0.9rem; }

        /* 初始隐藏按钮，跳转失败再显示 */
        #manual-btn {
            display: none; 
            margin-top: 30px;
            padding: 12px 24px;
            background-color: #007AFF;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="content">
        <div class="loader" id="loader"></div>
        <h2 id="status-text">正在安全返回应用...</h2>
        <p>认证已成功，请稍候</p>
        
        <a id="manual-btn" href="#">立即返回 App</a>
    </div>

    <script>
        // ======= 配置区 =======
        const CONFIG = {
            domain: "hifier.mediacare.top",
            package: "top.mediacare.hifier",
            path: "/auth"
        };

        function triggerJump() {
            // 1. 获取当前页面的所有参数 (code, state, token 等)
            const params = window.location.search;
            
            // 2. 构造强力 Intent 协议
            const intentUri = `intent://${CONFIG.domain}${CONFIG.path}${params}#Intent;scheme=https;package=${CONFIG.package};end`;

            // 3. 将 Intent 绑定到手动按钮上
            const btn = document.getElementById('manual-btn');
            btn.href = intentUri;

            // 4. 尝试立即自动跳转
            window.location.replace(intentUri);

            // 5. 容错处理：如果 2 秒后页面还在，说明被浏览器拦截了
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('status-text').innerText = '请点击下方按钮继续';
                document.getElementById('manual-btn').style.display = 'inline-block';
            }, 2000);
        }

        // 页面加载完成后执行
        window.onload = triggerJump;
    </script>
</body>
</html>
